[package]
name = "slopd"
version = "0.1.0"
edition = "2024"

[dependencies]
slop-proto = { path = "../slop-proto" }
tokio = { version = "1", features = ["full"] }
serde_json = "1"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3.27.0"
